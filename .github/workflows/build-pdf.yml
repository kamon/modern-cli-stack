name: Build PDF

# Trigger on every push to main and on PRs that touch content.
on:
  push:
    branches: [main]
    paths:
      - 'system/**'
      - 'install-cli-stack.sh'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'system/**'
      - 'install-cli-stack.sh'

# Cancel in-progress runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Pandoc + LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            librsvg2-bin

      - name: Install Python deps
        working-directory: system
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet pyyaml jinja2 rich watchdog

      - name: Run pre-build hooks (audit AI tells)
        working-directory: system
        run: |
          .venv/bin/python scripts/hooks/check_ai_tells.py --mode audit content/modern-cli-stack

      - name: Build the PDF
        working-directory: system
        run: .venv/bin/python scripts/build.py modern-cli-stack

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: modern-cli-stack-pdf
          path: system/output/modern-cli-stack/modern-cli-stack-v*.pdf
          if-no-files-found: error

      - name: Verify PDF metadata
        if: success()
        run: |
          PDF=$(ls system/output/modern-cli-stack/modern-cli-stack-v*.pdf | head -1)
          echo "Built: $PDF"
          pdfinfo "$PDF" | grep -E "Pages|File size|Title"